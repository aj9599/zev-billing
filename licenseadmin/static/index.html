<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZEV Billing — License Control</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #1f2937; }
  header { background: #667eea; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  main { max-width: 1080px; margin: 24px auto; padding: 0 16px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  h2 { font-size: 15px; margin: 0 0 14px; color: #374151; }
  label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  input { width: 100%; padding: 9px 11px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
  button { background: #667eea; color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-weight: 600; font-size: 14px; cursor: pointer; }
  button.secondary { background: #fff; color: #374151; border: 1px solid #e5e7eb; }
  button.danger { background: #fff; color: #dc2626; border: 1px solid #fecaca; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
  .row > div { flex: 1; min-width: 140px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 8px; font-size: 13px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
  th { color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 12px; word-break: break-all; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .badge.ok { background: #d1fae5; color: #065f46; }
  .badge.revoked { background: #fee2e2; color: #991b1b; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
  .dot.on { background: #10b981; } .dot.off { background: #d1d5db; }
  .device { font-size: 12px; color: #4b5563; padding: 4px 0; display: flex; align-items: center; gap: 8px; }
  .muted { color: #9ca3af; font-size: 12px; }
  .msg { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-top: 12px; }
  .msg.err { background: #fee2e2; color: #991b1b; } .msg.ok { background: #d1fae5; color: #065f46; }
  .login { max-width: 360px; margin: 80px auto; }
  .keybox { background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 8px; padding: 10px; margin-top: 10px; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>
<header>
  <span>🔑</span><h1>ZEV Billing — License Control</h1>
</header>
<main>
  <div id="login" class="card login" style="display:none">
    <h2>Operator login</h2>
    <label>Password</label>
    <input id="pw" type="password" placeholder="operator password" onkeydown="if(event.key==='Enter')login()" />
    <div style="margin-top:12px"><button onclick="login()">Sign in</button></div>
    <div id="loginMsg"></div>
  </div>

  <div id="app" style="display:none">
    <div class="card">
      <h2>Create a license key</h2>
      <div class="row">
        <div><label>Licensee (name / company)</label><input id="cLicensee" placeholder="Acme AG" /></div>
        <div><label>Valid for (days, 0 = perpetual)</label><input id="cDays" type="number" value="365" /></div>
        <div><label>Max devices</label><input id="cMax" type="number" value="1" /></div>
        <div style="flex:0 0 auto"><button onclick="createKey()">Create key</button></div>
      </div>
      <div id="createMsg"></div>
      <div id="createKeyBox"></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 style="margin:0">Licenses</h2>
        <button class="secondary" onclick="load()">Refresh</button>
      </div>
      <div id="listMsg"></div>
      <table id="tbl">
        <thead><tr>
          <th>Licensee</th><th>Key</th><th>Devices</th><th>Status</th><th>Expires</th><th>Actions</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
let PW = sessionStorage.getItem("admin_pw") || "";

function api(path, opts={}) {
  opts.headers = Object.assign({ "X-Admin-Password": PW, "Content-Type": "application/json" }, opts.headers||{});
  return fetch(path, opts).then(async r => {
    const txt = await r.text();
    let body = {}; try { body = txt ? JSON.parse(txt) : {}; } catch { body = { error: txt }; }
    if (!r.ok) throw new Error(body.message || body.error || ("HTTP " + r.status));
    return body;
  });
}

function show(el, msg, ok) { el.innerHTML = msg ? `<div class="msg ${ok?'ok':'err'}">${escape(msg)}</div>` : ""; }
function escape(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function login() {
  PW = document.getElementById("pw").value;
  try {
    await api("/api/keys");           // probe auth
    sessionStorage.setItem("admin_pw", PW);
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    load();
  } catch (e) {
    show(document.getElementById("loginMsg"), "Wrong password.", false);
  }
}

function relTime(iso) {
  if (!iso) return "never";
  const t = new Date(iso).getTime(); if (isNaN(t)) return iso;
  const m = Math.floor((Date.now() - t) / 60000);
  if (m < 1) return "just now"; if (m < 60) return m + "m ago";
  const h = Math.floor(m/60); if (h < 48) return h + "h ago";
  return Math.floor(h/24) + "d ago";
}
function isOnline(iso) {            // "online" = seen within 26h (refresh runs every 12h)
  const t = new Date(iso).getTime();
  return !isNaN(t) && (Date.now() - t) < 26*3600*1000;
}

async function load() {
  try {
    const keys = await api("/api/keys");
    const rows = document.getElementById("rows");
    rows.innerHTML = "";
    if (!keys || keys.length === 0) { rows.innerHTML = `<tr><td colspan="6" class="muted">No licenses yet.</td></tr>`; return; }
    for (const k of keys) {
      const devs = Object.entries(k.devices || {});
      const devHtml = devs.length === 0
        ? `<span class="muted">none</span>`
        : devs.map(([id, d]) => `
            <div class="device">
              <span class="dot ${isOnline(d.lastSeen)?'on':'off'}"></span>
              <span>${escape(d.hostname || id.slice(0,10))}</span>
              <span class="muted">· ${relTime(d.lastSeen)}</span>
              <button class="danger" style="padding:1px 8px;font-size:11px" onclick="rmDevice('${k.id}','${id}')">remove</button>
            </div>`).join("");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${escape(k.licensee||"—")}</strong><div class="muted">${escape(k.id)}</div></td>
        <td><code>${escape(k.key||"—")}</code>${k.key?`<div><button class="secondary" style="padding:2px 8px;font-size:11px;margin-top:4px" onclick="copyKey(this,'${escape(k.key)}')">copy</button></div>`:""}</td>
        <td>${devHtml}<div class="muted" style="margin-top:4px">limit ${k.maxActivations||1} ·
            <a href="#" onclick="setMax('${k.id}',${k.maxActivations||1});return false">change</a></div></td>
        <td>${k.revoked?'<span class="badge revoked">revoked</span>':'<span class="badge ok">active</span>'}</td>
        <td>${k.expires ? escape(k.expires.slice(0,10)) : '<span class="muted">never</span>'}</td>
        <td><div class="actions">
          <button class="secondary" onclick="toggleRevoke('${k.id}',${!k.revoked})">${k.revoked?'Un-revoke':'Revoke'}</button>
          <button class="danger" onclick="delKey('${k.id}','${escape(k.licensee||k.id)}')">Delete</button>
        </div></td>`;
      rows.appendChild(tr);
    }
  } catch (e) { show(document.getElementById("listMsg"), e.message, false); }
}

async function createKey() {
  const licensee = document.getElementById("cLicensee").value.trim();
  const days = parseInt(document.getElementById("cDays").value || "0", 10);
  const max = parseInt(document.getElementById("cMax").value || "1", 10);
  const cm = document.getElementById("createMsg");
  if (!licensee) { show(cm, "Licensee is required.", false); return; }
  try {
    const res = await api("/api/keys", { method: "POST", body: JSON.stringify({ licensee, days, max_activations: max }) });
    show(cm, "Key created.", true);
    document.getElementById("createKeyBox").innerHTML =
      `<div class="keybox"><div class="muted">Give this key to the customer:</div><code id="newKey">${escape(res.key)}</code>
       <div style="margin-top:8px"><button class="secondary" onclick="copyKey(this, document.getElementById('newKey').textContent)">copy</button></div></div>`;
    document.getElementById("cLicensee").value = "";
    load();
  } catch (e) { show(cm, e.message, false); }
}

function copyKey(btn, text) { navigator.clipboard.writeText(text).then(()=>{ const o=btn.textContent; btn.textContent="copied!"; setTimeout(()=>btn.textContent=o,1200); }); }

async function toggleRevoke(id, revoked) {
  try { await api(`/api/keys/${id}/revoke`, { method:"POST", body: JSON.stringify({ revoked }) }); load(); }
  catch (e) { alert(e.message); }
}
async function setMax(id, cur) {
  const v = prompt("Max devices for this key:", cur); if (v===null) return;
  const max = parseInt(v,10); if (isNaN(max) || max<1) return;
  try { await api(`/api/keys/${id}/max`, { method:"POST", body: JSON.stringify({ max }) }); load(); }
  catch (e) { alert(e.message); }
}
async function rmDevice(id, deviceId) {
  if (!confirm("Free this device slot? The device will drop to the free tier on its next check.")) return;
  try { await api(`/api/keys/${id}/devices/${encodeURIComponent(deviceId)}`, { method:"DELETE" }); load(); }
  catch (e) { alert(e.message); }
}
async function delKey(id, name) {
  if (!confirm(`Delete license for "${name}"? This cannot be undone. The key will stop working at its next online check.`)) return;
  try { await api(`/api/keys/${id}`, { method:"DELETE" }); load(); }
  catch (e) { alert(e.message); }
}

// boot
if (PW) {
  api("/api/keys").then(() => {
    document.getElementById("app").style.display = "block"; load();
  }).catch(() => { document.getElementById("login").style.display = "block"; });
} else {
  document.getElementById("login").style.display = "block";
}
</script>
</body>
</html>
